<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#636e72"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff"/>
      <stop offset="100%" style="stop-color:#0984e3"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdcb6e"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e17055"/>
      <stop offset="100%" style="stop-color:#d63031"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1400" height="900" fill="#fafafa" rx="8"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="1400" height="70" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="35" width="1400" height="35" fill="url(#headerGrad)"/>
  <text x="700" y="32" text-anchor="middle" fill="white" font-size="24" font-weight="600">Infinite-Genre-Instance-Dungeons</text>
  <text x="700" y="55" text-anchor="middle" fill="#b2bec3" font-size="13">无限流副本记忆系统 — 让你的AI真正记住每一次冒险</text>

  <!-- 左侧: 副本工作流 -->
  <g transform="translate(30, 90)">
    <text x="0" y="0" fill="#2d3436" font-size="16" font-weight="600">📋 副本工作流</text>

    <!-- 场景时间线 -->
    <rect x="0" y="15" width="280" height="280" fill="white" rx="8" stroke="#dfe6e9" stroke-width="1" filter="url(#shadow)"/>
    <text x="15" y="40" fill="#636e72" font-size="12" font-weight="600">场景时间线</text>

    <!-- 夜/章节分组 -->
    <g transform="translate(15, 55)">
      <rect x="0" y="0" width="250" height="35" fill="#dfe6e9" rx="4"/>
      <text x="10" y="22" fill="#2d3436" font-size="12" font-weight="600">第一夜</text>
      <text x="200" y="22" fill="#636e72" font-size="11">1 场景</text>
    </g>

    <g transform="translate(15, 100)">
      <rect x="0" y="0" width="250" height="40" fill="#00b894" rx="4"/>
      <text x="10" y="18" fill="white" font-size="12" font-weight="500">1-3 月光森林</text>
      <text x="10" y="32" fill="#55efc4" font-size="10">2/2 ✓</text>
    </g>

    <g transform="translate(15, 150)">
      <rect x="0" y="0" width="250" height="40" fill="#dfe6e9" rx="4"/>
      <text x="10" y="18" fill="#2d3436" font-size="12">2-3 狐族废墟</text>
      <text x="10" y="32" fill="#636e72" font-size="10">2/2</text>
    </g>

    <g transform="translate(15, 200)">
      <rect x="0" y="0" width="250" height="35" fill="#dfe6e9" rx="4"/>
      <text x="10" y="22" fill="#2d3436" font-size="12" font-weight="600">第二夜</text>
      <text x="200" y="22" fill="#636e72" font-size="11">2 场景</text>
    </g>

    <g transform="translate(15, 245)">
      <rect x="0" y="0" width="250" height="35" fill="#fdcb6e" rx="4"/>
      <text x="10" y="22" fill="#2d3436" font-size="12">3-4 封印神殿</text>
      <text x="10" y="32" fill="#636e72" font-size="10">进行中</text>
    </g>
  </g>

  <!-- 左侧: 属性面板 -->
  <g transform="translate(30, 400)">
    <text x="0" y="0" fill="#2d3436" font-size="16" font-weight="600">📊 属性面板</text>

    <rect x="0" y="15" width="280" height="180" fill="white" rx="8" stroke="#dfe6e9" stroke-width="1" filter="url(#shadow)"/>

    <g transform="translate(15, 35)">
      <rect x="0" y="0" width="60" height="55" fill="#dfe6e9" rx="4"/>
      <text x="30" y="20" text-anchor="middle" fill="#636e72" font-size="10">周目</text>
      <text x="30" y="40" text-anchor="middle" fill="#2d3436" font-size="18" font-weight="600">1</text>
    </g>

    <g transform="translate(85, 35)">
      <rect x="0" y="0" width="60" height="55" fill="#dfe6e9" rx="4"/>
      <text x="30" y="20" text-anchor="middle" fill="#636e72" font-size="10">路线</text>
      <text x="30" y="40" text-anchor="middle" fill="#e17055" font-size="11">未解锁</text>
    </g>

    <g transform="translate(155, 35)">
      <rect x="0" y="0" width="60" height="55" fill="#dfe6e9" rx="4"/>
      <text x="30" y="20" text-anchor="middle" fill="#636e72" font-size="10">碎片</text>
      <text x="30" y="40" text-anchor="middle" fill="#2d3436" font-size="18" font-weight="600">0</text>
    </g>

    <g transform="translate(15, 100)">
      <rect x="0" y="0" width="60" height="55" fill="#dfe6e9" rx="4"/>
      <text x="30" y="20" text-anchor="middle" fill="#636e72" font-size="10">狐族信任</text>
      <text x="30" y="40" text-anchor="middle" fill="#00b894" font-size="18" font-weight="600">30</text>
    </g>

    <g transform="translate(85, 100)">
      <rect x="0" y="0" width="60" height="55" fill="#dfe6e9" rx="4"/>
      <text x="30" y="20" text-anchor="middle" fill="#636e72" font-size="10">妖化侵蚀</text>
      <text x="30" y="40" text-anchor="middle" fill="#2d3436" font-size="18" font-weight="600">0</text>
    </g>

    <g transform="translate(155, 100)">
      <rect x="0" y="0" width="60" height="55" fill="#dfe6e9" rx="4"/>
      <text x="30" y="20" text-anchor="middle" fill="#636e72" font-size="10">前世真相</text>
      <text x="30" y="40" text-anchor="middle" fill="#2d3436" font-size="18" font-weight="600">0</text>
    </g>
  </g>

  <!-- 中间: 记忆系统核心 -->
  <g transform="translate(340, 90)">
    <text x="0" y="0" fill="#2d3436" font-size="16" font-weight="600">🧠 记忆系统核心</text>

    <!-- 输入层 -->
    <rect x="0" y="20" width="350" height="80" fill="url(#inputGrad)" rx="8" filter="url(#shadow)"/>
    <text x="175" y="45" text-anchor="middle" fill="white" font-size="14" font-weight="600">📥 输入层</text>
    <text x="175" y="65" text-anchor="middle" fill="#dfe6e9" font-size="11">用户对话 | 场景图片 | 角色互动 | 剧情选择</text>

    <!-- 箭头 -->
    <path d="M175 100 L175 120" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

    <!-- 核心处理 -->
    <rect x="0" y="120" width="350" height="100" fill="url(#coreGrad)" rx="8" filter="url(#shadow)"/>
    <text x="175" y="145" text-anchor="middle" fill="white" font-size="14" font-weight="600">🧠 核心处理</text>
    <text x="175" y="165" text-anchor="middle" fill="#dfe6e9" font-size="11">话题分析 → 记忆形成 → 关系图谱</text>
    <text x="175" y="185" text-anchor="middle" fill="#dfe6e9" font-size="11">人物印象 → 时间记忆 → 多模态融合</text>

    <!-- 箭头 -->
    <path d="M175 220 L175 240" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

    <!-- 存储层 -->
    <rect x="0" y="240" width="350" height="80" fill="url(#storageGrad)" rx="8" filter="url(#shadow)"/>
    <text x="175" y="265" text-anchor="middle" fill="#2d3436" font-size="14" font-weight="600">💾 存储层</text>
    <text x="175" y="285" text-anchor="middle" fill="#636e72" font-size="11">SQLite | LanceDB | 图数据库 | 时间线</text>

    <!-- 箭头 -->
    <path d="M175 320 L175 340" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

    <!-- 输出层 -->
    <rect x="0" y="340" width="350" height="80" fill="url(#outputGrad)" rx="8" filter="url(#shadow)"/>
    <text x="175" y="365" text-anchor="middle" fill="white" font-size="14" font-weight="600">📤 输出层</text>
    <text x="175" y="385" text-anchor="middle" fill="#dfe6e9" font-size="11">上下文注入 | 角色演化 | 剧情延续 | 记忆召回</text>
  </g>

  <!-- 右侧: 回忆系统 -->
  <g transform="translate(720, 90)">
    <text x="0" y="0" fill="#2d3436" font-size="16" font-weight="600">🔮 回忆系统</text>

    <rect x="0" y="15" width="320" height="200" fill="white" rx="8" stroke="#dfe6e9" stroke-width="1" filter="url(#shadow)"/>

    <g transform="translate(15, 35)">
      <rect x="0" y="0" width="290" height="35" fill="#00b894" rx="4"/>
      <text x="10" y="22" fill="white" font-size="12" font-weight="500">📍 当前场景: 月光森林</text>
      <text x="240" y="22" fill="#55efc4" font-size="11">第1周目</text>
    </g>

    <g transform="translate(15, 80)">
      <text x="0" y="0" fill="#636e72" font-size="11">已到达场景</text>
      <rect x="0" y="10" width="290" height="30" fill="#dfe6e9" rx="4"/>
      <text x="10" y="30" fill="#2d3436" font-size="11">第一夜 月光森林</text>
    </g>

    <g transform="translate(15, 130)">
      <text x="0" y="0" fill="#636e72" font-size="11">已解锁结局</text>
      <rect x="0" y="10" width="290" height="30" fill="#dfe6e9" rx="4"/>
      <text x="10" y="30" fill="#636e72" font-size="11">还没有完成任何结局</text>
    </g>

    <g transform="translate(15, 175)">
      <text x="0" y="0" fill="#636e72" font-size="11">跨周目记忆</text>
      <rect x="0" y="10" width="290" height="30" fill="#dfe6e9" rx="4"/>
      <text x="10" y="30" fill="#636e72" font-size="11">还没有发现隐藏回忆</text>
    </g>
  </g>

  <!-- 右侧: 存档系统 -->
  <g transform="translate(720, 320)">
    <text x="0" y="0" fill="#2d3436" font-size="16" font-weight="600">💾 存档系统</text>

    <rect x="0" y="15" width="320" height="120" fill="white" rx="8" stroke="#dfe6e9" stroke-width="1" filter="url(#shadow)"/>

    <g transform="translate(15, 35)">
      <rect x="0" y="0" width="290" height="35" fill="#636e72" rx="4"/>
      <text x="10" y="22" fill="white" font-size="12">📁 自动存档</text>
      <text x="200" y="22" fill="#b2bec3" font-size="10">7/5/2026, 6:45 AM</text>
    </g>

    <g transform="translate(15, 80)">
      <rect x="0" y="0" width="90" height="30" fill="#dfe6e9" rx="4"/>
      <text x="45" y="20" text-anchor="middle" fill="#2d3436" font-size="11">📤 导出</text>

      <rect x="100" y="0" width="90" height="30" fill="#dfe6e9" rx="4"/>
      <text x="145" y="20" text-anchor="middle" fill="#2d3436" font-size="11">📥 导入</text>

      <rect x="200" y="0" width="90" height="30" fill="#e17055" rx="4"/>
      <text x="245" y="20" text-anchor="middle" fill="white" font-size="11">🔄 重开</text>
    </g>
  </g>

  <!-- 右侧: 视觉资产 -->
  <g transform="translate(720, 470)">
    <text x="0" y="0" fill="#2d3436" font-size="16" font-weight="600">🎨 视觉资产</text>

    <rect x="0" y="15" width="320" height="100" fill="white" rx="8" stroke="#dfe6e9" stroke-width="1" filter="url(#shadow)"/>

    <g transform="translate(15, 35)">
      <rect x="0" y="0" width="90" height="60" fill="#dfe6e9" rx="4"/>
      <text x="45" y="35" text-anchor="middle" fill="#636e72" font-size="11">🖼️ 图片</text>

      <rect x="100" y="0" width="90" height="60" fill="#dfe6e9" rx="4"/>
      <text x="145" y="35" text-anchor="middle" fill="#636e72" font-size="11">🎬 视频</text>

      <rect x="200" y="0" width="90" height="60" fill="#dfe6e9" rx="4"/>
      <text x="245" y="35" text-anchor="middle" fill="#636e72" font-size="11">🎵 音乐</text>
    </g>
  </g>

  <!-- 底部: 最终效果 -->
  <g transform="translate(340, 600)">
    <rect x="0" y="0" width="350" height="60" fill="#00b894" rx="8" filter="url(#shadow)"/>
    <text x="175" y="25" text-anchor="middle" fill="white" font-size="16" font-weight="600">✨ 下一轮副本 ✨</text>
    <text x="175" y="45" text-anchor="middle" fill="#55efc4" font-size="12">不是重开新档，而是继续冒险</text>
  </g>

  <!-- 底部: 连接线 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/>
    </marker>
  </defs>

  <!-- 工作流到记忆系统 -->
  <path d="M310 250 L340 250" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 记忆系统到回忆系统 -->
  <path d="M690 250 L720 250" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 记忆系统到最终效果 -->
  <path d="M515 540 L515 600" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 装饰元素 -->
  <circle cx="50" cy="850" r="30" fill="#dfe6e9" opacity="0.3"/>
  <circle cx="1350" cy="850" r="40" fill="#dfe6e9" opacity="0.3"/>
</svg>